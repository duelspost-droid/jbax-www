<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JB×AX — 비공식 플레이그라운드</title>
<meta name="description" content="개인 학습·실험용 비공식 플레이그라운드 · 여의도 맛집 트래커 외 준비 중">
<meta property="og:title" content="JB×AX 플레이그라운드">
<meta property="og:description" content="개인이 운영하는 비공식 플레이그라운드 (공식 서비스 아님)">
<meta property="og:type" content="website">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    min-height: 100vh; color: #1a2330;
    background: radial-gradient(1200px 600px at 50% -10%, #1565c0 0%, #0a3d7a 45%, #062a57 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 20px;
  }
  .head { text-align: center; margin-bottom: 22px; }
  .head h1 { color: #fff; font-size: 1.5rem; font-weight: 900; letter-spacing: 0.5px; }
  .head h1 .hl { background: linear-gradient(90deg,#ffd54a,#ffb300); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .head p { color: #b9cde8; font-size: 0.86rem; font-weight: 600; margin-top: 5px; }
  .head .notice {
    display: inline-block; margin-top: 11px;
    font-size: 0.72rem; font-weight: 700; color: #ffd98a;
    background: rgba(255,193,7,0.12); border: 1px solid rgba(255,193,7,0.32);
    border-radius: 20px; padding: 5px 13px;
  }

  .grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
    width: 100%; max-width: 720px;
  }
  .slot {
    background: #fff; border-radius: 20px; padding: 24px 22px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.28); min-height: 320px;
    display: flex; flex-direction: column;
  }

  /* 슬롯 1 — 맛집 트래커 */
  .logo {
    width: 64px; height: 64px; margin-bottom: 14px; border-radius: 18px;
    background: linear-gradient(135deg, #1565c0, #0a3d7a);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 16px rgba(10,61,122,0.32); position: relative; flex-shrink: 0;
  }
  .logo .emoji { font-size: 1.9rem; line-height: 1; }
  .logo .tag {
    position: absolute; bottom: -7px; right: -7px;
    background: #fff; color: #0a3d7a; font-weight: 900; font-size: 0.6rem;
    padding: 2px 6px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  .tag .hl { background: linear-gradient(90deg,#ffd54a,#ffb300); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .slot h2 { font-size: 1.12rem; font-weight: 900; margin-bottom: 3px; }
  .slot h2 .hl-ax { background: linear-gradient(90deg,#ffb300,#ff8f00); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .slot .sub { font-size: 0.78rem; color: #8090a3; font-weight: 700; margin-bottom: 12px; }
  .slot .desc { font-size: 0.84rem; color: #44566b; line-height: 1.6; margin-bottom: 14px; flex: 1; }
  .slot .desc b { color: #0a3d7a; }
  .cta {
    display: block; text-align: center; text-decoration: none; cursor: pointer;
    background: linear-gradient(135deg, #1565c0, #0a3d7a); color: #fff;
    font-size: 0.92rem; font-weight: 800; padding: 12px; border-radius: 12px;
    transition: transform 0.12s, box-shadow 0.12s; box-shadow: 0 6px 16px rgba(10,61,122,0.28);
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(10,61,122,0.36); }

  /* 빈 슬롯 — 준비 중 (?) */
  .slot.empty {
    align-items: center; justify-content: center; text-align: center;
    background: rgba(255,255,255,0.92); border: 2px dashed #cdd8e6; box-shadow: 0 10px 30px rgba(0,0,0,0.16);
  }
  .slot.empty .qmark {
    width: 72px; height: 72px; border-radius: 50%;
    background: #eef3fa; color: #9fb2cb; font-size: 2.6rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center; margin-bottom: 14px;
  }
  .slot.empty .label { font-size: 0.92rem; font-weight: 800; color: #8a9ab0; }
  .slot.empty .soon { font-size: 0.74rem; color: #aab6c7; font-weight: 600; margin-top: 4px; }

  .foot { margin-top: 22px; text-align: center; max-width: 720px; }
  .foot a { color: #b9cde8; text-decoration: none; font-size: 0.78rem; font-weight: 700; }
  .foot a:hover { text-decoration: underline; }
  .foot-note { margin-top: 7px; font-size: 0.7rem; color: #7e93b5; line-height: 1.5; }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; max-width: 380px; }
    .slot { min-height: auto; }
    .slot.empty { padding: 30px 22px; }
  }
</style>
</head>
<body>
  <div class="head">
    <h1>JB<span class="hl">×AX</span></h1>
    <p>서비스 모음</p>
    <span class="notice">🧪 비공식 플레이그라운드 · 공식 서비스 아님</span>
  </div>

  <div class="grid">
    <!-- 슬롯 1: 맛집 트래커 -->
    <div class="slot">
      <div class="logo">
        <span class="emoji">🍽️</span>
        <span class="tag">JB<span class="hl">×AX</span></span>
      </div>
      <h2>맛집 트래커</h2>
      <div class="sub">여의도 JB빌딩 근처</div>
      <div class="desc">
        <b>AI가 매일 새벽</b> 여의도 맛집을 점심·저녁·술집별로 자동 추천해요.
        날씨·JB금융 소식·주가까지 반영합니다.
      </div>
      <a class="cta" href="https://lunch.jbax.co.kr/">바로가기 →</a>
    </div>

    <!-- 슬롯 2~4: 준비 중 -->
    <div class="slot empty">
      <div class="qmark">?</div>
      <div class="label">준비 중</div>
      <div class="soon">Coming soon</div>
    </div>
    <div class="slot empty">
      <div class="qmark">?</div>
      <div class="label">준비 중</div>
      <div class="soon">Coming soon</div>
    </div>
    <div class="slot empty">
      <div class="qmark">?</div>
      <div class="label">준비 중</div>
      <div class="soon">Coming soon</div>
    </div>
  </div>

  <div class="foot">
    <a href="https://www.jbax.co.kr/">www.jbax.co.kr</a>
    <div class="foot-note">개인이 학습·실험용으로 운영하는 비공식 플레이그라운드입니다. 어떤 기관·회사의 공식 서비스도 아닙니다.</div>
  </div>
</body>
</html>
